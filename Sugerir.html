<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#4caf50",
                    "surface-container": "#eeeeee",
                    "primary": "#006e1c",
                    "background": "#f9f9f9",
                    "surface-container-highest": "#e2e2e2",
                    "on-primary": "#ffffff",
                    "on-surface-variant": "#3f4a3c",
                    "on-secondary-container": "#653900",
                    "on-surface": "#1a1c1c",
                    "outline-variant": "#becab9",
                    "inverse-surface": "#2f3131",
                    "tertiary-fixed": "#ffd9e2",
                    "on-tertiary-container": "#690034",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#861948",
                    "on-tertiary-fixed": "#3e001c",
                    "outline": "#6f7a6b",
                    "surface-tint": "#006e1c",
                    "secondary": "#8b5000",
                    "primary-fixed": "#94f990",
                    "on-secondary-fixed-variant": "#693c00",
                    "on-error": "#ffffff",
                    "tertiary-container": "#f26f9d",
                    "on-error-container": "#93000a",
                    "secondary-fixed": "#ffdcbe",
                    "tertiary-fixed-dim": "#ffb1c7",
                    "primary-fixed-dim": "#78dc77",
                    "on-background": "#1a1c1c",
                    "surface-container-low": "#f3f3f4",
                    "tertiary": "#a63360",
                    "surface": "#f9f9f9",
                    "surface-variant": "#e2e2e2",
                    "inverse-primary": "#78dc77",
                    "error-container": "#ffdad6",
                    "surface-dim": "#dadada",
                    "surface-bright": "#f9f9f9",
                    "secondary-container": "#ff9800",
                    "on-secondary-fixed": "#2c1600",
                    "on-primary-fixed": "#002204",
                    "on-primary-fixed-variant": "#005313",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#003c0b",
                    "error": "#ba1a1a",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed-dim": "#ffb870",
                    "inverse-on-surface": "#f0f1f1",
                    "surface-container-high": "#e8e8e8"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        /* Custom Soft UI shadow to avoid clipping */
        .soft-ui-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -3px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen">
<!-- Top Navigation Bar -->
<nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl shadow-sm flex justify-between items-center px-6 h-16">
<div class="text-xl font-extrabold bg-gradient-to-br from-green-700 to-green-500 bg-clip-text text-transparent font-['Plus_Jakarta_Sans'] tracking-tight">
            Cardápio Digital
        </div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-zinc-500" data-icon="notifications">notifications</span>
</button>
<div class="w-8 h-8 rounded-full bg-surface-container overflow-hidden">
<img alt="User profile photo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDC1V79ups9rnVB7mtAoL5prFlylWgLVLNV8WtJjqwUB6eRmoGydnQNi0Qy5X03qSsu2YIb1PEtDQLSZh2q_hU8CeRfsjKS543WYQwebBezbAJy4oEHo0k-41LOT0GIxe9XcZaBgOxklCyhofpuVd-zmKtr3DwGw4C3bHfBKmXJwdCkYEu-8q9VlBdVPPMGzNVJvsYselyntsbdjx7nj6t71JT5spiodkiI-UwD925F1Bv0KeZs5qOq_IouWF3B1pky6r0duRnXGw"/>
</div>
</div>
</nav>
<!-- Main Container with fixed bottom padding for NavBar -->
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto min-h-screen">
<!-- Header Section -->
<header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
<div class="max-w-md">
<span class="text-secondary font-bold text-sm tracking-widest uppercase mb-2 block">Sua Voz</span>
<h1 class="text-4xl font-extrabold tracking-tight text-on-surface mb-4">
                    Como podemos <span class="text-primary">melhorar?</span>
</h1>
<p class="text-on-surface-variant leading-relaxed">
                    Queremos construir o melhor cardápio escolar com você. Conte-nos sua sugestão ou o que gostaria de ver amanhã.
                </p>
</div>
<!-- Illustration representing communication -->
<div class="relative w-32 h-32 flex-shrink-0 mx-auto md:mx-0">
<div class="absolute inset-0 bg-primary-container/20 rounded-xl rotate-6"></div>
<div class="absolute inset-0 bg-secondary-container/20 rounded-xl -rotate-3"></div>
<div class="relative z-10 w-full h-full bg-white soft-ui-shadow rounded-xl flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-5xl text-primary" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</div>
</div>
</header>
<!-- Quick Suggestions Section -->
<section class="mb-10">
<label class="block text-sm font-bold text-on-surface-variant mb-4 ml-1">Sugestões rápidas</label>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-3 bg-white soft-ui-shadow border border-transparent hover:border-primary/20 hover:bg-primary/5 transition-all rounded-full font-semibold text-sm active:scale-95">
                    Mais variedade
                </button>
<button class="px-6 py-3 bg-white soft-ui-shadow border border-transparent hover:border-primary/20 hover:bg-primary/5 transition-all rounded-full font-semibold text-sm active:scale-95">
                    Mais saudável
                </button>
<button class="px-6 py-3 bg-white soft-ui-shadow border border-transparent hover:border-primary/20 hover:bg-primary/5 transition-all rounded-full font-semibold text-sm active:scale-95">
                    Melhor tempero
                </button>
<button class="px-6 py-3 bg-white soft-ui-shadow border border-transparent hover:border-primary/20 hover:bg-primary/5 transition-all rounded-full font-semibold text-sm active:scale-95">
                    Opções veganas
                </button>
</div>
</section>
<!-- Feedback Area -->
<section class="space-y-6">
<div class="relative group">
<textarea class="w-full h-48 p-6 bg-white text-on-surface rounded-2xl focus:ring-2 focus:ring-primary/20 border border-zinc-100 outline-none resize-none soft-ui-shadow transition-all placeholder:text-zinc-400" placeholder="Escreva aqui sua ideia..."></textarea>
<div class="absolute bottom-4 right-4 text-xs font-semibold text-zinc-400">
                    Mínimo 10 caracteres
                </div>
</div>
<!-- Action Button -->
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-2xl shadow-lg shadow-primary/20 flex items-center justify-center gap-3 active:scale-[0.98] transition-transform">
<span>Enviar Sugestão</span>
<span class="material-symbols-outlined" data-icon="send">send</span>
</button>
</section>
<!-- Impact Section -->
<div class="mt-16 p-8 rounded-2xl bg-white soft-ui-shadow border border-zinc-100 relative overflow-hidden flex items-center gap-6">
<div class="flex-1 z-10">
<h3 class="font-bold text-lg text-on-surface mb-1">Impacto Real</h3>
<p class="text-sm text-on-surface-variant">Suas sugestões já resultaram em 12 novos pratos no cardápio este mês!</p>
</div>
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center z-10 shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="trending_up">trending_up</span>
</div>
<!-- Decorative circle -->
<div class="absolute -right-10 -bottom-10 w-40 h-40 bg-primary/5 rounded-full"></div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe bg-white/95 dark:bg-zinc-950/95 backdrop-blur-xl shadow-[0_-8px_30px_rgba(0,0,0,0.04)] rounded-t-[2.5rem] z-50 border-t border-zinc-100 dark:border-zinc-800">
<button class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 px-4 py-2 hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-[10px] font-bold uppercase tracking-wider mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 px-4 py-2 hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
<span class="text-[10px] font-bold uppercase tracking-wider mt-1">Menu</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 px-4 py-2 hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="star_rate">star_rate</span>
<span class="text-[10px] font-bold uppercase tracking-wider mt-1">Avaliações</span>
</button>
<!-- Active Tab: Suggestions -->
<button class="flex flex-col items-center justify-center bg-primary/10 text-primary rounded-2xl px-5 py-2 active:scale-90">
<span class="material-symbols-outlined" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="text-[10px] font-bold uppercase tracking-wider mt-1">Sugerir</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 px-4 py-2 hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[10px] font-bold uppercase tracking-wider mt-1">Perfil</span>
</button>
</nav>
</body></html>
